[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "mkdir -p /data && npm run start"
healthcheckPath = "/"
healthcheckInterval = 15
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[ports]]
containerPort = 3000

[[volumes]]
name = "snakebet-data"
mountPath = "/data"

[env]
NODE_ENV = "production"
PORT = "3000"
DB_PATH = "/data"
